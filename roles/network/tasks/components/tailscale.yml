---
# $ gpg --show-key repo.gpg
# pub   rsa4096 2020-02-25 [SC]
#       2596A99EAAB33821893C0A79458CA832957F5868
# uid                      Tailscale Inc. (Package repository signing key) <info@tailscale.com>
# sub   rsa4096 2020-02-25 [E]
- name: Add Tailscale package signing key
  rpm_key:
    key: https://pkgs.tailscale.com/stable/fedora/repo.gpg
    fingerprint: "2596A99EAAB33821893C0A79458CA832957F5868"

- name: Add Tailscale yum repository
  yum_repository:
    name: tailscale
    description: Tailscale Yum Repository
    baseurl: https://pkgs.tailscale.com/stable/fedora/$basearch
    gpgcheck: True
    gpgkey: https://pkgs.tailscale.com/stable/fedora/repo.gpg

- name: Install tailscale
  package:
    name: tailscale
    state: latest

- name: Enable and start tailscaled service
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if tailscale is already authenticated
  command: tailscale status
  register: tailscale_status
  ignore_errors: true
  changed_when: false

- name: Get current date
  command: date +%Y-%m-%d
  register: current_date
  changed_when: false

- name: Check Tailscale auth key expiration
  set_fact:
    tailscale_key_expired: true
  when:
    - tailscale.expiration_date is defined
    - current_date.stdout > tailscale.expiration_date

- name: Warn about expired Tailscale auth key
  debug:
    msg: "WARNING: Tailscale auth key expired on {{ tailscale.expiration_date }}. Skipping Tailscale authentication. Please generate a new key at https://login.tailscale.com/admin/settings/keys and update the workstation repository."
  when: tailscale_key_expired | default(false)

- name: Authenticate with Tailscale
  command: tailscale up --auth-key={{ tailscale.auth_key }}
  when:
    - tailscale.auth_key | length > 0
    - tailscale_status.rc != 0
    - not tailscale_key_expired | default(false)
  no_log: true
