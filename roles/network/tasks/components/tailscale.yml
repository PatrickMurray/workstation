---
# $ gpg --show-key repo.gpg
# pub   rsa4096 2020-02-25 [SC]
#       2596A99EAAB33821893C0A79458CA832957F5868
# uid                      Tailscale Inc. (Package repository signing key) <info@tailscale.com>
# sub   rsa4096 2020-02-25 [E]
- name: Add Tailscale package signing key
  rpm_key:
    key: https://pkgs.tailscale.com/stable/fedora/repo.gpg
    fingerprint: "2596A99EAAB33821893C0A79458CA832957F5868"

- name: Add Tailscale yum repository
  yum_repository:
    name: tailscale
    description: Tailscale Yum Repository
    baseurl: https://pkgs.tailscale.com/stable/fedora/$basearch
    gpgcheck: True
    gpgkey: https://pkgs.tailscale.com/stable/fedora/repo.gpg

- name: Install tailscale
  package:
    name: tailscale
    state: latest

- name: Enable and start tailscaled service
  systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if tailscale is already authenticated
  command: tailscale status
  register: tailscale_status
  ignore_errors: true
  changed_when: false

- name: Authenticate with Tailscale
  command: tailscale up --auth-key={{ tailscale.auth_key }}
  when:
    - tailscale.auth_key | length > 0
    - tailscale_status.rc != 0
  no_log: true
