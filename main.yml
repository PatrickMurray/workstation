---
- hosts: localhost
  vars_files:
    - secrets.yml
    - workstations.yml
  vars:
    _workstation_type: "{{ workstation_type | default('default') }}"
  tasks:
    - name: Execute roles for workstation
      include_role:
        name: "{{ role }}"
        apply:
          tags: workstation_setup
      loop_control:
        loop_var: role
      loop: "{{ workstations[_workstation_type].roles }}"
